name: Deploy to PythonAnywhere

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 || echo "测试依赖安装失败，跳过"

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__,.github || echo "Lint 检查跳过"
      continue-on-error: true

    - name: Run tests
      run: |
        pytest tests/ -v || echo "No tests yet"
      continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to PythonAnywhere via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PA_SSH_HOST }}
        username: ${{ secrets.PA_USERNAME }}
        key: ${{ secrets.PA_SSH_KEY }}
        script: |
          set -e

          # 进入项目目录
          cd /home/${{ secrets.PA_USERNAME }}/etf-tool-mvp

          # 拉取最新代码
          echo "📥 拉取最新代码..."
          git pull origin main

          # 激活虚拟环境
          echo "🐍 激活虚拟环境..."
          source /home/${{ secrets.PA_USERNAME }}/.virtualenvs/myenv/bin/activate || echo "虚拟环境不存在，跳过"

          # 安装/更新依赖
          echo "📦 更新依赖..."
          pip install -r requirements.txt || echo "requirements.txt 不存在，跳过"

          # 重启 Web 应用
          echo "🔄 重启 Web 应用..."
          touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py

          echo "✅ 部署完成！"

    - name: Health Check
      run: |
        sleep 10
        response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/)
        if [ $response -eq 200 ]; then
          echo "✅ 健康检查通过"
        else
          echo "❌ 健康检查失败，HTTP 状态码: $response"
          exit 1
        fi

    - name: Notify
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "🚀 部署成功！"
          echo "   访问: https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/"
        else
          echo "❌ 部署失败！"
          echo "   查看日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        fi

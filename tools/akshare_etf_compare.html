<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKShare ETF 对比工具 - Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        .demo-badge { display: inline-block; background: #e74c3c; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; margin-left: 10px; vertical-align: middle; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 13px; }
        .demo-notice { background: #fff3cd; border: 1px solid #ffeaa7; padding: 12px 15px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; color: #856404; }
        .demo-notice strong { color: #d35400; }
        .input-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { flex: 1; padding: 10px 12px; border: 2px solid #e0e6ed; border-radius: 6px; font-size: 14px; }
        input[type="text"]:focus { outline: none; border-color: #3498db; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .hint { color: #95a5a6; font-size: 12px; }
        .results-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .results-section.show { display: block; }
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #34495e; color: white; padding: 10px 8px; text-align: left; font-weight: 600; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td { padding: 8px; border-bottom: 1px solid #ecf0f1; }
        tr:hover { background: #f8f9fa; }
        .number { font-family: "Times New Roman", Times, serif; text-align: right; }
        .positive { color: #e74c3c; }
        .negative { color: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 AKShare ETF 对比工具 <span class="demo-badge">DEMO</span></h1>
        <p class="subtitle">基于 AKShare 开源金融数据 API - 实时 ETF 行情对比（当前为演示模式，使用模拟数据）</p>
        
        <div class="demo-notice">
            <strong>⚠️ 演示模式：</strong>当前展示的是模拟数据。要连接真实 AKShare API，请部署后端服务（见 tools/akshare_backend.py）。
        </div>
        
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="etfInput" placeholder="输入 ETF 代码（如：510300, 510500, 159915）" value="510300, 510500">
                <button onclick="compareEtfs()">对比</button>
            </div>
            <div class="hint">提示：输入逗号分隔的 ETF 代码，然后点击"对比"按钮</div>
        </div>
        
        <div class="results-section" id="resultsSection">
            <div style="margin-bottom: 15px;">
                <strong>对比结果：</strong><span id="resultsCount"></span>
            </div>
            <div class="table-container" id="tableContainer"></div>
        </div>
    </div>
    
    <script>
        // 模拟数据（AKShare ETF 现货行情字段）
        const mockEtfData = {
            "510300": {
                "代码": "510300",
                "名称": "沪深300ETF",
                "最新价": 4.05,
                "IOPV实时估值": 4.04,
                "基金折价率": 0.25,
                "涨跌额": 0.08,
                "涨跌幅": 2.02,
                "成交量": 1250111500,
                "成交额": 5050000000,
                "开盘价": 3.98,
                "最高价": 4.07,
                "最低价": 3.97,
                "昨收": 3.97,
                "振幅": 2.52,
                "换手率": 5.1,
                "量比": 1.5,
                "最新份额": 45000000000,
                "流通市值": 182000000000,
                "总市值": 182000000000
            },
            "510500": {
                "代码": "510500",
                "名称": "中证500ETF",
                "最新价": 6.82,
                "IOPV实时估值": 6.81,
                "基金折价率": 0.15,
                "涨跌额": 0.12,
                "涨跌幅": 1.79,
                "成交量": 890056000,
                "成交额": 6100000000,
                "开盘价": 6.72,
                "最高价": 6.85,
                "最低价": 6.70,
                "昨收": 6.70,
                "振幅": 2.24,
                "换手率": 4.8,
                "量比": 1.3,
                "最新份额": 12000000000,
                "流通市值": 81800000000,
                "总市值": 81800000000
            },
            "159915": {
                "代码": "159915",
                "名称": "创业板ETF",
                "最新价": 2.34,
                "IOPV实时估值": 2.33,
                "基金折价率": 0.43,
                "涨跌额": 0.05,
                "涨跌幅": 2.18,
                "成交量": 2100560000,
                "成交额": 4920000000,
                "开盘价": 2.28,
                "最高价": 2.35,
                "最低价": 2.27,
                "昨收": 2.29,
                "振幅": 3.49,
                "换手率": 6.2,
                "量比": 1.8,
                "最新份额": 8500000000,
                "流通市值": 19890000000,
                "总市值": 19890000000
            }
        };
        
        function compareEtfs() {
            const input = document.getElementById('etfInput');
            const codes = input.value.split(/[,\s]+/).filter(c => c.trim());
            
            if (codes.length === 0) {
                alert('请输入 ETF 代码');
                return;
            }
            
            // 准备对比数据
            const compareData = [];
            const notFound = [];
            
            codes.forEach(code => {
                code = code.trim();
                if (mockEtfData[code]) {
                    compareData.push(mockEtfData[code]);
                } else {
                    notFound.push(code);
                }
            });
            
            if (notFound.length > 0) {
                alert(`未找到以下 ETF 代码（演示模式仅包含 510300, 510500, 159915）：${notFound.join(', ')}`);
            }
            
            if (compareData.length === 0) {
                alert('没有可对比的 ETF 数据');
                return;
            }
            
            // 显示结果
            document.getElementById('resultsCount').textContent = `共 ${compareData.length} 只 ETF`;
            renderTable(compareData);
            document.getElementById('resultsSection').classList.add('show');
        }
        
        function renderTable(data) {
            const container = document.getElementById('tableContainer');
            const fields = Object.keys(data[0]);
            
            let html = '<table><thead><tr>';
            fields.forEach(field => {
                html += `<th>${field}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            data.forEach(etf => {
                html += '<tr>';
                fields.forEach(field => {
                    let value = etf[field];
                    
                    if (typeof value === 'number') {
                        if (field === '涨跌幅' || field === '基金折价率') {
                            const cls = value > 0 ? 'positive' : (value < 0 ? 'negative' : '');
                            html += `<td class="number ${cls}">${value.toFixed(2)}%</td>`;
                        } else if (field.includes('额') || field.includes('值') || field === '成交量') {
                            html += `<td class="number">${formatNumber(value)}</td>`;
                        } else {
                            html += `<td class="number">${value.toFixed(2)}</td>`;
                        }
                    } else {
                        html += `<td>${value || '-'}</td>`;
                    }
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function formatNumber(num) {
            if (num >= 1e8) {
                return (num / 1e8).toFixed(2) + '亿';
            } else if (num >= 1e4) {
                return (num / 1e4).toFixed(2) + '万';
            } else {
                return num.toFixed(2);
            }
        }
        
        // 允许按回车触发对比
        document.getElementById('etfInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                compareEtfs();
            }
        });
    </script>
</body>
</html>

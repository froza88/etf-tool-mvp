<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeStock ETF对比工具</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1400px; margin:0 auto; background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
        .input-section { margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-weight: 500; font-size: 13px; color: #333; }
        .input-group input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 300px; }
        .input-group button { padding: 8px 20px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        .input-group button:hover { background: #40a9ff; }
        .input-group button:disabled { background: #d9d9d9; cursor: not-allowed; }
        .hint { font-size: 12px; color: #999; }
        .info-box { background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 4px; padding: 8px 12px; color: #1890ff; font-size: 12px; margin-bottom: 10px; display: none; }
        .error-box { background: #fff2f0; border: 1px solid #ffccc7; border-radius: 4px; padding: 8px 12px; color: #ff4d4f; font-size: 13px; margin-bottom: 10px; display: none; }
        .loading-box { text-align: center; padding: 30px; color: #999; font-size: 14px; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e8e8e8; border-top: 2px solid #1890ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
        th { background: #fafafa; font-weight: 600; position: sticky; top: 0; cursor: pointer; font-size: 12px; color: #666; user-select: none; }
        th:hover { background: #f0f0f0; }
        tr:hover { background: #fafafa; }
        .num { font-family: "Times New Roman", "Georgia", serif; text-align: right; }
        .pos { color: #f5222d; }
        .neg { color: #52c41a; }
        .tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin: 2px; }
        .tag-blue { background: #e6f7ff; color: #1890ff; }
        .tag-green { background: #f6ffed; color: #52c41a; }
        .tag-red { background: #fff2f0; color: #ff4d4f; }
        .field-category { font-size: 11px; color: #999; padding: 4px 8px; background: #f5f5f5; border-radius: 3px; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 WeStock ETF 对比工具</h1>
        <div class="subtitle">数据源：WeStock Data (腾讯自选股) · 实时行情 + 持仓 + 风险指标</div>

        <div class="input-section">
            <div class="input-group">
                <label>ETF 代码（逗号分隔）：</label>
                <input type="text" id="etfCodes" placeholder="例如：510300, 510500, 159915" value="510300, 510500" />
                <div class="hint">输入6位ETF代码，无需前缀 sh/sz</div>
            </div>
            <div class="input-group">
                <label>&nbsp;</label>
                <button id="btnCompare" onclick="compareEtfs()">🔍 对比</button>
            </div>
        </div>

        <div id="infoBox" class="info-box"></div>
        <div id="errorBox" class="error-box"></div>

        <div id="loadingBox" class="loading-box" style="display:none;">
            <span class="loading-spinner"></span> 正在调用 WeStock 数据，请稍候...
        </div>

        <div id="resultSection" style="display:none;">
            <div id="fieldCategory" class="field-category"></div>
            <div class="table-wrapper">
                <table id="comparisonTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = '/api/tools/westock/etf-compare';

        let currentData = null;
        let sortField = null;
        let sortAsc = true;

        async function compareEtfs() {
            const codesInput = document.getElementById('etfCodes').value;
            const codes = codesInput.split(',').map(c => c.trim()).filter(c => c);
            if (codes.length === 0) { showError('请输入至少一个ETF代码'); return; }

            showLoading(true);
            hideError();
            hideInfo();

            try {
                const resp = await fetch(`${API_ENDPOINT}?codes=${codes.join(',')}`);
                const data = await resp.json();
                if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);
                currentData = data;
                renderTable(data);
                showInfo(`✅ 成功对比 ${data.count} 只ETF · 数据源：${data.source} · 更新时间：${new Date(data.updated).toLocaleString('zh-CN')}`);
            } catch (err) {
                showError('对比失败：' + err.message);
            } finally {
                showLoading(false);
            }
        }

        function renderTable(data) {
            const etfs = data.etfs;
            if (!etfs || etfs.length === 0) { showError('未获取到ETF数据'); return; }

            // 收集所有字段（去重，按第一个ETF的字段顺序）
            const allFields = [];
            const fieldSet = new Set();
            etfs.forEach(etf => {
                Object.keys(etf).forEach(k => {
                    if (!fieldSet.has(k)) { fieldSet.add(k); allFields.push(k); }
                });
            });

            // 表头
            const thHtml = '<tr>' +
                allFields.map(f => `<th onclick="sortTable('${f}')" title="${f}">${f} ${sortField===f ? (sortAsc?'↑':'↓') : '↕'}</th>`).join('') +
                '</tr>';
            document.getElementById('tableHeader').innerHTML = thHtml;

            // 数据行
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = etfs.map(etf => {
                return '<tr>' + allFields.map(f => {
                    const v = etf[f];
                    const cls = getCellClass(f, v);
                    const display = formatValue(f, v);
                    return `<td class="${cls}">${display}</td>`;
                }).join('') + '</tr>';
            }).join('');

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('fieldCategory').textContent = `字段数：${allFields.length} · ETF数：${etfs.length}`;
        }

        function getCellClass(field, value) {
            if (typeof value === 'number') return 'num';
            if (field.includes('涨') || field.includes('跌') || field.includes('回撤') || field.includes('return')) {
                return value > 0 ? 'pos' : (value < 0 ? 'neg' : '');
            }
            return '';
        }

        function formatValue(field, value) {
            if (value === null || value === undefined || value === '') return '-';
            if (typeof value === 'number') {
                // 大数字：万/亿
                if (Math.abs(value) > 1e8) return (value/1e8).toFixed(2) + '亿';
                if (Math.abs(value) > 1e4) return (value/1e4).toFixed(2) + '万';
                // 比率类：转百分比
                if (field.includes('率') || field.includes('Ratio') || field.includes('pct') || field.includes('Pct')) {
                    return (value * 100).toFixed(2) + '%';
                }
                return value.toFixed(4);
            }
            if (typeof value === 'string' && value.length > 50) return value.slice(0, 50) + '...';
            return value;
        }

        function sortTable(field) {
            if (!currentData || !currentData.etfs) return;
            if (sortField === field) { sortAsc = !sortAsc; } else { sortField = field; sortAsc = true; }
            currentData.etfs.sort((a, b) => {
                const va = a[field], vb = b[field];
                if (va == null) return 1;
                if (vb == null) return -1;
                return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
            });
            renderTable(currentData);
        }

        function showLoading(show) {
            document.getElementById('loadingBox').style.display = show ? 'block' : 'none';
            document.getElementById('btnCompare').disabled = show;
        }
        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }
        function showInfo(msg) {
            const box = document.getElementById('infoBox');
            box.textContent = msg;
            box.style.display = 'block';
        }
        function hideInfo() { document.getElementById('infoBox').style.display = 'none'; }

        // 页面加载后自动对比
        window.addEventListener('load', () => { compareEtfs(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 专业对比 · Pro Terminal</title>
    <style>
        :root {
            --bg: #0a0e1a; --surface: #111827; --surface2: #1a2332; --border: #1e293b;
            --text: #e2e8f0; --text2: #6b7280; --accent: #00c2ff; --accent2: #6e4ae6;
            --row-hover: rgba(0,194,255,0.06); --row-odd: rgba(255,255,255,0.02);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: var(--text); min-height:100vh;
            background-image: radial-gradient(ellipse 70% 45% at 50% -15%, rgba(0,194,255,0.05), transparent),
                            radial-gradient(ellipse 50% 35% at 85% 75%, rgba(110,74,230,0.035), transparent);
        }
        .container { max-width:1440px; margin:0 auto; padding:20px 32px 40px; }

        /* Header */
        .header {
            background: rgba(17,24,39,0.92);
            backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-bottom:1px solid var(--border);
            padding:0 32px; height:56px; display:flex; align-items:center;
            justify-content:space-between; position:sticky; top:0; z-index:100;
            gap:16px;
        }
        .logo { font-size:17px; font-weight:800; letter-spacing:-0.3px; white-space:nowrap; display:flex; align-items:center; gap:2px; }
        .logo .c1 { color:rgba(255,255,255,0.9); }
        .logo .c2 { color:var(--accent); margin:0 1px; }
        .logo .pro { background:linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:700; }
        .header-center { display:flex; align-items:center; justify-content:center; flex:1; font-size:12px; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
        .header-time { color:var(--text2); font-size:11px; font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; letter-spacing:0.3px; font-variant-numeric:tabular-nums; }
        .btn { padding:7px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer;
               transition:all 0.2s cubic-bezier(0.4,0,0.2,1); display:flex; align-items:center; gap:5px; border:none; text-decoration:none; }
        .btn-back { background:var(--surface2); color:var(--text); border:1px solid rgba(30,41,59,0.6); }
        .btn-back:hover { background:rgba(0,194,255,0.08); color:#fff; border-color:rgba(0,194,255,0.3); }
        .btn-export { background:linear-gradient(135deg, rgba(0,194,255,0.15), rgba(110,74,230,0.15)); color:var(--accent); border:1px solid rgba(0,194,255,0.4); }
        .btn-export:hover { background:linear-gradient(135deg, rgba(0,194,255,0.25), rgba(110,74,230,0.25)); border-color:rgba(0,194,255,0.6); }
        .btn-export:disabled { opacity:0.5; cursor:not-allowed; }

        /* Hero - compact redesign */
        .hero { background:linear-gradient(135deg, rgba(0,194,255,0.06) 0%, rgba(110,74,230,0.05) 50%, rgba(0,194,255,0.04) 100%);
            border:1px solid rgba(0,194,255,0.12); border-radius:14px; padding:20px 24px;
            margin-bottom:20px; }
        .hero-main { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; }
        .hero-tags { display:flex; gap:8px; flex-wrap:wrap; flex:1; }
        .hero-tag { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid rgba(30,41,59,0.5);
            border-radius:8px; padding:8px 12px; font-size:12px; font-weight:700; white-space:nowrap; }
        .hero-tag .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .hero-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
        .hero-meta-time { font-size:11px; color:var(--accent); font-family:'SF Mono','Fira Code',Consolas,monospace; }
        .hero-meta-count { font-size:10px; color:var(--text2); }
        .hero-metrics { display:flex; flex-direction:column; gap:10px; margin-top:16px; }
        .hero-metric-row { display:flex; align-items:center; gap:12px; font-size:13px; }
        .hero-metric-label { color:var(--text2); font-weight:600; min-width:80px; font-size:11px; text-transform:uppercase; letter-spacing:0.8px; }
        .hero-metric-vals { display:flex; gap:16px; flex-wrap:wrap; }
        .hero-metric-val { font-family:'SF Mono','Fira Code',Consolas,monospace; font-weight:700; font-variant-numeric:tabular-nums; }

        /* Comparison Table */
        .compare-section { margin-bottom:20px; }
        .section-title { font-size:13px; font-weight:700; color:rgba(255,255,255,0.7); margin-bottom:12px; display:flex; align-items:center; gap:8px; letter-spacing:0.5px; }
        .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg, rgba(0,194,255,0.2), transparent); }

        .compare-table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:12px; background:var(--surface);
            scrollbar-width:thin; scrollbar-color:rgba(0,194,255,0.15) transparent; }
        .compare-table-wrap::-webkit-scrollbar { height:5px; }
        .compare-table-wrap::-webkit-scrollbar-track { background:transparent; }
        .compare-table-wrap::-webkit-scrollbar-thumb { background:rgba(0,194,255,0.15); border-radius:3px; }

        .compare-table { width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed; }
        .compare-table thead th {
            background:var(--surface2); padding:10px 10px; text-align:center; font-weight:700;
            font-size:11px; color:rgba(255,255,255,0.75); border-bottom:2px solid rgba(0,194,255,0.4);
            white-space:nowrap; vertical-align:middle; letter-spacing:0.3px;
            max-width:0; overflow:hidden; text-overflow:ellipsis; position:relative;
        }
        .compare-table thead th:first-child {
            text-align:left; position:sticky; left:0; z-index:11; min-width:130px; background:var(--surface2);
            border-right:1px solid rgba(30,41,59,0.5); font-weight:600; color:rgba(255,255,255,0.5);
        }
        .compare-table thead th .etf-code { font-size:12px; font-weight:800; letter-spacing:-0.2px; }
        .compare-table thead th .etf-name { font-size:10px; opacity:0.5; font-weight:500; letter-spacing:0.2px; }

        .compare-table tbody td {
            padding:10px 10px; text-align:center; border-bottom:1px solid rgba(30,41,59,0.3);
            font-size:15px; transition:background 0.15s;
            vertical-align:middle; letter-spacing:0;
            font-family:'SF Mono','Fira Code',Consolas,'Courier New',monospace; font-variant-numeric:tabular-nums;
            max-width:0; overflow:hidden; text-overflow:ellipsis;
        }
        .compare-table tbody tr:nth-child(odd) td { background:var(--row-odd); }
        .compare-table tbody tr:hover td { background:var(--row-hover); }
        .compare-table tbody tr:hover td:first-child { background:rgba(0,194,255,0.08); }
        .compare-table tbody tr:first-child td { border-top:2px solid rgba(0,194,255,0.4); }
        .compare-table tbody td:first-child {
            text-align:left; font-weight:700; color:rgba(226,232,240,0.9); font-family:inherit;
            position:sticky; left:0; background:var(--surface); z-index:5; min-width:130px;
            border-right:1px solid rgba(30,41,59,0.5); font-size:14px; letter-spacing:0.3px;
            font-variant-numeric:normal;
        }
        .row-holdings td { min-width:180px; white-space:normal; word-break:break-all; vertical-align:top; }
        .row-holdings td:first-child { min-width:130px; }

        .compare-table tbody td.neutral { color:rgba(255,255,255,0.85); }

        .group-header td { background:rgba(0,194,255,0.04) !important; color:rgba(0,194,255,0.7) !important; font-weight:700 !important; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; padding:7px 12px !important; text-align:left; }
        .group-header td:first-child { background:rgba(0,194,255,0.04) !important; }

        /* Ring Chart */
        .ring-section { margin-bottom:20px; }
        .ring-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:16px; }
        .ring-card { background:var(--surface); border:1px solid rgba(30,41,59,0.5); border-radius:12px; padding:16px; }
        .ring-card-title { font-size:12px; font-weight:700; color:rgba(255,255,255,0.7); margin-bottom:12px; letter-spacing:0.5px; }
        .ring-card-body { display:flex; align-items:center; gap:16px; }
        .ring-svg-wrap { flex-shrink:0; position:relative; }
        .ring-svg { display:block; }
        .ring-center-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
        .ring-center-code { font-size:11px; font-weight:800; color:#fff; font-family:'SF Mono','Fira Code',Consolas,monospace; }
        .ring-center-val { font-size:9px; color:var(--text2); margin-top:1px; }
        .ring-legend { flex:1; display:flex; flex-direction:column; gap:6px; }
        .ring-legend-item { display:flex; align-items:center; gap:6px; font-size:11px; }
        .ring-legend-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
        .ring-legend-code { font-weight:700; color:rgba(255,255,255,0.8); min-width:45px; font-size:11px; }
        .ring-legend-val { color:var(--text); font-family:'SF Mono','Fira Code',Consolas,monospace; margin-left:auto; font-size:12px; }

        /* Footer */
        .footer-actions { display:flex; justify-content:center; gap:14px; margin-top:8px; }

        @media (max-width: 768px) {
            .container { padding: 12px 12px 80px 12px; }
            .hero { padding: 16px 14px; }
            .hero-main { flex-direction:column; gap:12px; }
            .hero-tags { gap:6px; }
            .hero-tag { padding: 6px 10px; font-size: 11px; }
            .hero-meta { flex-direction:row; align-items:center; gap:12px; }
            .hero-metrics { margin-top:12px; gap:8px; }
            .hero-metric-row { font-size:12px; gap:8px; }
            .hero-metric-label { min-width:65px; font-size:10px; }
            .ring-grid { grid-template-columns: 1fr; gap: 12px; }
            .ring-card { padding: 12px; }
            .ring-card-title { font-size: 11px; margin-bottom: 8px; }
            .ring-card-body { gap: 12px; }
            .compare-table-wrap { margin: 0 -12px; border-radius: 0; border-left: none; border-right: none; }
            .compare-table thead th, .compare-table tbody td { padding: 10px 6px; font-size: 13px; }
            .compare-table thead th:first-child, .compare-table tbody td:first-child { min-width: 80px; max-width: 100px; font-size: 13px; }
            .compare-table thead th:not(:first-child), .compare-table tbody td:not(:first-child) { min-width: 85px; }
            .section-title { font-size: 12px; }
            .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; z-index: 100; justify-content: space-between; }
        }

        @media (max-width: 480px) {
            .container { padding: 8px 8px 70px 8px; }
            .header { padding: 0 8px; }
            .logo { font-size: 12px; }
            .header-center { display: none; }
            .btn { padding: 5px 8px; font-size: 10px; }
            .hero { padding: 12px 10px; }
            .hero-tag { padding: 5px 8px; font-size: 11px; }
            .hero-metric-row { font-size: 11px; }
            .hero-metric-label { min-width: 55px; font-size: 9px; }
            .ring-card { padding: 10px; }
            .ring-card-title { font-size: 10px; }
            .ring-card-body { gap: 8px; }
            .compare-table-wrap { margin: 0 -8px; }
            .compare-table thead th, 
            .compare-table tbody td { 
                padding: 8px 4px; 
                font-size: 12px; 
            }
            .compare-table thead th:first-child, 
            .compare-table tbody td:first-child { 
                min-width: 70px; 
                max-width: 85px;
                font-size: 12px;
            }
            .section-title { font-size: 11px; }
            .footer-actions { padding: 10px 12px; }
        }

        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .animate-in { animation:fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo"><span class="c1">ETF</span><span class="c2">·</span><span class="pro">Pro Terminal</span></div>
        <div class="header-center">
            <span class="header-time" id="headerTime">数据加载中…</span>
        </div>
        <div>
            <a href="/" class="btn btn-back">← 返回列表</a>
        </div>
    </div>

    <div class="container">
        <!-- Loading -->
        <div id="loadingIndicator" style="text-align:center;padding:60px 20px;color:var(--text2);font-size:15px;">
            ⏳ 正在加载 ETF 数据...
        </div>

        <!-- Hero -->
        <div class="hero animate-in" style="animation-delay:0s;display:none" id="heroSection">
            <div class="hero-main">
                <div class="hero-tags" id="heroTags"></div>
                <div class="hero-meta">
                    <div class="hero-meta-time" id="heroTime"></div>
                    <div class="hero-meta-count" id="heroCount"></div>
                </div>
            </div>
            <div class="hero-metrics" id="heroMetrics"></div>
        </div>

        <!-- Ring Chart: Scale & Liquidity -->
        <div class="ring-section animate-in" style="animation-delay:0.05s;display:none" id="ringSection">
            <div class="section-title">📊 规模 & 流动性</div>
            <div class="ring-grid" id="ringGrid"></div>
        </div>

        <!-- Comparison Table -->
        <div class="compare-section animate-in" style="animation-delay:0.1s;display:none" id="tableSection">
            <div class="section-title">📊 ETF 核心指标对比</div>
            <div class="compare-table-wrap">
                <table class="compare-table" id="compareTable"></table>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-actions animate-in" style="animation-delay:0.3s;display:none" id="footerSection">
            <a href="/" class="btn btn-back">返回 ETF 列表</a>
            <button class="btn btn-export" id="btnExport" onclick="screenCaptureFullPage()">📷 导出全页</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
    let etfs = [];
    const colors = ['#00d4ff', '#f59e0b', '#f97316', '#7c3aed', '#ec4899', '#06b6d4'];
    const CODES = "{{ codes if codes is defined else '' }}".split(',').map(c => c.trim()).filter(c => c);

    // ==================== UTILS ====================
    function fmt(v, d, unit) {
        d = d || 2; unit = unit || '';
        if (v === undefined || v === null || v === '') return '-';
        if (typeof v === 'number') {
            if (unit === '亿') return (v / 100000000).toFixed(d) + '亿';
            if (unit === '万') return (v / 10000).toFixed(d) + '万';
            return v.toFixed(d) + unit;
        }
        return v + unit;
    }
    function fmtSigned(v, d, unit) {
        d = d || 2; unit = unit || '%';
        if (v === undefined || v === null) return '-';
        if (typeof v === 'string') {
            if (v.startsWith('+') || v.startsWith('-')) return v + unit;
            return v + unit;
        }
        return (v >= 0 ? '+' : '') + v.toFixed(d) + unit;
    }
    function timeAgo(ts) {
        if (!ts) return '未知时间';
        try {
            var d = new Date(ts.replace('T', ' '));
            var now = new Date();
            var diff = (now - d) / 1000;
            if (diff < 60) return '刚刚更新';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前更新';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前更新';
            return Math.floor(diff / 86400) + '天前更新';
        } catch(e) { return ts.slice(0, 16).replace('T', ' '); }
    }

    // ==================== TABLE COLUMNS ====================
    var TABLE_COLUMNS = [
        // 基本信息
        { group:'基本信息', label:'跟踪指数', key:'benchmark', fmtFn:function(v){return v||'-';}, higherBetter:null, isString:true },
        { group:'基本信息', label:'发行方', key:'issuer_full', fmtFn:function(v){return v||'-';}, higherBetter:null, isString:true },
        { group:'基本信息', label:'成立日期', key:'issue_date', fmtFn:function(v){return v||'-';}, higherBetter:null, isString:true },
        { group:'基本信息', label:'分类', key:'category', fmtFn:function(v){return v||'-';}, higherBetter:null, isString:true },
        { group:'基本信息', label:'前五大持仓', key:'top_holdings', fmtFn:function(v){if(!v||!v.length)return '-'; return v.map(function(h){return (h.name||h.Name||'-')+'('+(h.weight||h.Weight||'-')+')';}).join('<br>');}, higherBetter:null, isString:true },
        // 规模流动性
        { group:'规模流动性', label:'规模', key:'scale', fmtFn:function(v){return fmt(v,2,'亿');}, higherBetter:true },
        { group:'规模流动性', label:'日均成交', key:'amount', fmtFn:function(v){return v!=null?fmt(v,2,'亿'):'-';}, higherBetter:true },
        { group:'规模流动性', label:'近5日净流入', key:'net_inflow_5d', fmtFn:function(v){return v!=null?fmt(v,2,'亿'):'-';}, higherBetter:true },
        // 费用估值
        { group:'费用估值', label:'费率(管理+托管)', key:'fee_rate', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        { group:'费用估值', label:'管理费率', key:'fee_rate_management', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        { group:'费用估值', label:'托管费率', key:'fee_rate_custody', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        { group:'费用估值', label:'溢折价率', key:'premium_discount', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        { group:'费用估值', label:'估值分位', key:'valuation_percentile', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        // 跟踪质量
        { group:'跟踪质量', label:'跟踪误差', key:'tracking_error', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        // 收益
        { group:'收益', label:'近1年收益', key:'year_1_return', fmtFn:fmtSigned, higherBetter:true },
        { group:'收益', label:'近3年均收益', key:'annual_3y', fmtFn:fmtSigned, higherBetter:true },
        { group:'收益', label:'夏普比率', key:'sharpe_ratio', fmtFn:function(v){return v!=null?fmt(v,2):'-';}, higherBetter:true },
        { group:'收益', label:'卡玛比率', key:'calmar_ratio', fmtFn:function(v){return v!=null?fmt(v,2):'-';}, higherBetter:true },
        // 风险
        { group:'风险', label:'最大回撤', key:'max_drawdown', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
        { group:'风险', label:'年化波动率', key:'annual_vol', fmtFn:function(v){return v!=null?fmt(v,2,'%'):'-';}, higherBetter:false },
    ];

    // ==================== RENDER HERO ====================
    function renderHero() {
        // Tags
        document.getElementById('heroTags').innerHTML = etfs.map(function(e, i) {
            var nameStr = e.code;
            if (e.name) nameStr += ' - ' + e.name;
            if (e.issuer_short) nameStr += ' - ' + e.issuer_short;
            return '<span class="hero-tag"><span class="dot" style="background:' + colors[i] + '"></span>' + nameStr + '</span>';
        }).join('');

        // Meta (right side)
        var dataTime = window.__dataUpdated || '';
        document.getElementById('heroTime').textContent = timeAgo(dataTime);
        document.getElementById('heroCount').textContent = etfs.length + ' 只对比';

        // Metrics: 规模、费率(管理费率)、跟踪误差/偏离度、流动性(日均成交额)、近一年收益
        var metrics = [
            { key:'scale', label:'规模', fmt:function(v){return fmt(v,0,'亿');} },
            { key:'fee_rate_management', label:'管理费率', fmt:function(v){return v!=null?fmt(v,2,'%'):'-';} },
            { key:'tracking_error', label:'跟踪误差', fmt:function(v){return v!=null?fmt(v,2,'%'):'-';} },
            { key:'amount', label:'日均成交', fmt:function(v){return v!=null?fmt(v,2,'亿'):'-';} },
            { key:'year_1_return', label:'近1年收益', fmt:fmtSigned },
        ];
        var metricsHtml = metrics.map(function(m) {
            var items = etfs.map(function(e, i) {
                if (typeof e[m.key] !== 'number') return '<span style="color:var(--text2)">-</span>';
                return '<span style="color:' + colors[i] + '">' + e.code + ' ' + m.fmt(e[m.key]) + '</span>';
            });
            return '<div class="hero-metric-row"><span class="hero-metric-label">' + m.label + '</span><span class="hero-metric-vals">' + items.join(' ') + '</span></div>';
        }).join('');
        document.getElementById('heroMetrics').innerHTML = metricsHtml;
    }

    // ==================== RENDER RING CHART ====================
    function renderRingChart() {
        var ringMetrics = [
            { key:'scale', label:'规模', fmt:function(v){return fmt(v,0,'亿');} },
            { key:'amount', label:'日均成交', fmt:function(v){return fmt(v,1,'亿');} },
        ];

        var html = '';
        ringMetrics.forEach(function(m) {
            var vals = etfs.map(function(e){return e[m.key];}).filter(function(v){return typeof v==='number';});
            if (vals.length === 0) return;
            var total = vals.reduce(function(s,v){return s+v;}, 0);
            if (total <= 0) return;

            // SVG ring
            var size = 110;
            var cx = size/2, cy = size/2;
            var radius = 42;
            var strokeWidth = 11;
            var circumference = 2 * Math.PI * radius;

            var rings = '';
            var cumPct = 0;
            etfs.forEach(function(e, i) {
                var v = e[m.key];
                if (typeof v !== 'number' || v <= 0) return;
                var pct = v / total;
                var dashLen = pct * circumference;
                var dashOffset = -cumPct * circumference;
                rings += '<circle cx="' + cx + '" cy="' + cy + '" r="' + radius + '" fill="none" stroke="' + colors[i] + '" stroke-width="' + strokeWidth + '" ' +
                         'stroke-dasharray="' + dashLen + ' ' + (circumference - dashLen) + '" stroke-dashoffset="' + dashOffset + '" opacity="0.85"/>';
                cumPct += pct;
            });

            var maxEtf = etfs.slice().sort(function(a,b){return (b[m.key]||0)-(a[m.key]||0);})[0];

            html += '<div class="ring-card">';
            html += '<div class="ring-card-title">' + m.label + '</div>';
            html += '<div class="ring-card-body">';
            html += '<div class="ring-svg-wrap">';
            html += '<svg class="ring-svg" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">';
            html += '<circle cx="' + cx + '" cy="' + cy + '" r="' + radius + '" fill="none" stroke="rgba(30,41,59,0.4)" stroke-width="' + strokeWidth + '"/>';
            html += rings;
            html += '</svg>';
            html += '<div class="ring-center-text"><span class="ring-center-code">' + (maxEtf ? maxEtf.code : '-') + '</span><div class="ring-center-val">' + (maxEtf ? m.fmt(maxEtf[m.key]) : '-') + '</div></div>';
            html += '</div>';

            // Legend
            html += '<div class="ring-legend">';
            etfs.forEach(function(e, i) {
                var v = e[m.key];
                if (typeof v !== 'number') { html += '<div class="ring-legend-item"><span class="ring-legend-dot" style="background:' + colors[i] + '"></span><span class="ring-legend-code">' + e.code + '</span><span class="ring-legend-val">-</span></div>'; return; }
                html += '<div class="ring-legend-item"><span class="ring-legend-dot" style="background:' + colors[i] + '"></span><span class="ring-legend-code">' + e.code + '</span><span class="ring-legend-val">' + m.fmt(v) + '</span></div>';
            });
            html += '</div>';
            html += '</div>';
            html += '</div>';
        });

        document.getElementById('ringGrid').innerHTML = html;
    }

    // ==================== RENDER TABLE ====================
    function renderTable() {
        var html = '<thead><tr><th style="width:15%">指标</th>';
        etfs.forEach(function(e, i) {
            var fullName = e.code;
            if (e.name) fullName += ' - ' + e.name;
            if (e.issuer_short) fullName += ' - ' + e.issuer_short;
            html += '<th style="width:calc((100% - 15%) / ' + etfs.length + ')"><span class="etf-code" style="color:' + colors[i] + '">' + fullName + '</span></th>';
        });
        html += '</tr></thead><tbody>';

        var currentGroup = '';
        TABLE_COLUMNS.forEach(function(col) {
            if (col.group !== currentGroup) {
                currentGroup = col.group;
                html += '<tr class="group-header"><td colspan="' + (etfs.length + 1) + '">' + col.group + '</td></tr>';
            }
            html += '<tr' + (col.label==='前五大持仓'?' class="row-holdings"':'') + '>';
            html += '<td>' + col.label + '</td>';
            if (col.isString) {
                etfs.forEach(function(e) { html += '<td class="neutral">' + col.fmtFn(e[col.key]) + '</td>'; });
            } else {
                var vals = etfs.map(function(e) { return e[col.key]; }).filter(function(v) { return typeof v === 'number'; });
                if (vals.length === 0) {
                    etfs.forEach(function(e) { html += '<td class="neutral">-</td>'; });
                } else {
                    etfs.forEach(function(e) {
                        var v = e[col.key];
                        if (typeof v !== 'number') { html += '<td class="neutral">-</td>'; return; }
                        html += '<td class="neutral">' + col.fmtFn(v) + '</td>';
                    });
                }
            }
            html += '</tr>';
        });
        html += '</tbody>';
        document.getElementById('compareTable').innerHTML = html;
    }

    // ==================== LOAD DATA ====================
    async function loadData() {
        document.getElementById('loadingIndicator').style.display = 'block';
        document.getElementById('heroSection').style.display = 'none';
        document.getElementById('ringSection').style.display = 'none';
        document.getElementById('tableSection').style.display = 'none';
        document.getElementById('footerSection').style.display = 'none';

        if (!CODES.length) {
            document.getElementById('loadingIndicator').innerHTML = '<div style="color:#ef4444;padding:40px">请提供ETF代码参数，如 ?codes=510300,510500</div>';
            return;
        }

        try {
            const response = await fetch(`/api/compare?codes=${CODES.join(',')}`);
            const data = await response.json();

            if (!response.ok || !data.etfs || !data.etfs.length) {
                document.getElementById('loadingIndicator').innerHTML = `<div style="color:#ef4444;padding:40px">未找到ETF数据: ${data.error || '未知错误'}</div>`;
                return;
            }

            etfs = data.etfs;
            window.__dataUpdated = data.updated || '';

            etfs.forEach(function(e) { if (e.price === null || e.price === undefined) e.price = e.close; });

            etfs.forEach(function(e) {
                if (e.year_3_return) {
                    e.annual_3y = (Math.pow(1 + e.year_3_return / 100, 1/3) - 1) * 100;
                }
                if (e.year_1_return && e.max_drawdown && e.max_drawdown !== 0) {
                    e.calmar_ratio = e.year_1_return / Math.abs(e.max_drawdown);
                }
            });

            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('heroSection').style.display = 'block';
            document.getElementById('ringSection').style.display = 'block';
            document.getElementById('tableSection').style.display = 'block';
            document.getElementById('footerSection').style.display = 'flex';

            renderHero();
            renderRingChart();
            renderTable();

            var ut = data.updated || '';
            document.getElementById('headerTime').textContent = timeAgo(ut);

            setTimeout(async () => {
                try {
                    const l2Response = await fetch(`/api/compare?codes=${CODES.join(',')}&source=westock`);
                    const l2Data = await l2Response.json();
                    if (l2Response.ok && l2Data.etfs && l2Data.etfs.length) {
                        updateWithL2Data(l2Data.etfs);
                    }
                } catch (e) { console.error('[L2] failed:', e); }
            }, 1000);

        } catch (error) {
            console.error('Load failed:', error);
            document.getElementById('loadingIndicator').innerHTML = '<div style="color:#ef4444;padding:40px">加载数据失败</div>';
        }
    }

    function updateWithL2Data(l2Etfs) {
        l2Etfs.forEach(function(l2) {
            var idx = etfs.findIndex(function(e) { return e.code === l2.code; });
            if (idx < 0) return;
            ['fee_rate_management','fee_rate_custody','fee_rate_service','fee_rate',
             'premium_discount','scale','shares','net_inflow_shares','net_inflow_ratio','net_inflow_5d',
             'amount','volume'].forEach(function(f) {
                if (l2[f] !== undefined && l2[f] !== null) {
                    var val = l2[f];
                    if ((f === 'scale') && typeof val === 'number' && val > 0 && val < 10000) {
                        val = val * 100000000;
                    }
                    etfs[idx][f] = val;
                }
            });
        });
        renderHero();
        renderRingChart();
        renderTable();
        var ht = document.getElementById('headerTime');
        if (ht) ht.textContent = ht.textContent + ' (L2已加载)';
    }

    window.onload = function() { loadData(); };

    // ========== 全页面截图 ==========
    async function screenCaptureFullPage() {
        try {
            var canvas = await html2canvas(document.body, {
                scale: 2, useCORS: true, logging: false,
                backgroundColor: '#0a0e1a',
                windowWidth: document.documentElement.scrollWidth,
                windowHeight: document.documentElement.scrollHeight
            });
            canvas.toBlob(function(blob) {
                if (!blob) return alert('截图失败');
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.download = 'ETF对比_' + etfs.map(function(e){return e.code;}).join('_') + '_' + new Date().toISOString().slice(0,10) + '.png';
                a.href = url; document.body.appendChild(a); a.click();
                document.body.removeChild(a); setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
            }, 'image/png');
        } catch(e) { alert('全页面截图失败: ' + e.message); }
    }
    </script>
</body>

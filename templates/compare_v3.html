<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 专业对比 · Pro Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg: #080d18;
            --surface: #101829;
            --surface2: #162032;
            --border: #1e2d45;
            --text: #a8b8cc;
            --text2: #6b7d99;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --green: #10b981;
            --red: #ef4444;
            --gold: #f59e0b;
            --gold2: #d97706;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.06), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.04), transparent);
        }
        
        .header {
            background: linear-gradient(180deg, rgba(16,24,41,0.95), rgba(8,13,24,0.98));
            backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 19px; font-weight: 700; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 24px; height: 24px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; color: var(--bg); font-size: 14px; }
        .nav-actions { display: flex; gap: 12px; }
        .btn { 
            padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
            display: flex; align-items: center; gap: 6px; font-weight: 500;
        }
        .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--border); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: var(--text2); }
        .btn-primary { background: var(--accent); color: var(--bg); font-weight: 600; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .container { max-width: 1400px; margin: 0 auto; padding: 32px 28px; }
        
        /* ── ETF Tags ── */
        .etf-banner { margin-bottom: 40px; }
        .etf-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
        .etf-tag { 
            padding: 4px 12px; background: var(--surface2); border: 1px solid var(--border); 
            border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 6px; color: var(--text);
        }
        .etf-tag-dot { width: 6px; height: 6px; border-radius: 50%; }
        .summary-stats { display: flex; gap: 40px; align-items: baseline; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
        .stat-value.accent { color: var(--accent); }

        /* ── Leaderboard ── */
        .section-title { font-size: 17px; font-weight: 600; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .leaderboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 48px; }
        .leader-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; 
            transition: transform 0.2s, border-color 0.2s; position: relative; overflow: hidden;
        }
        .leader-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .leader-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .leader-label { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
        .leader-list { display: flex; flex-direction: column; gap: 12px; }
        .leader-item { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .leader-name { color: var(--text); font-weight: 500; }
        .leader-val { font-family: "JetBrains Mono", monospace; font-weight: 600; }
        .val-up { color: var(--green); }
        .val-down { color: var(--red); }

        /* ── Chart Section ── */
        .chart-row { display: flex; flex-direction: column; gap: 24px; margin-bottom: 40px; }
        .chart-box { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; 
            padding: 24px; transition: opacity 0.3s ease;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .chart-title { font-size: 16px; font-weight: 600; color: #fff; }
        .chart-unit { font-size: 12px; color: var(--text2); background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
        .chart-container { height: 320px; position: relative; }

        /* ── Filter Panel ── */
        .filter-panel { 
            background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; 
            padding: 16px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 12px;
        }
        .filter-chip { 
            padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; color: var(--text2);
        }
        .filter-chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

        /* ── Export Menu ── */
        .export-dropdown { position: relative; }
        .export-menu { 
            position: absolute; top: 40px; right: 0; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 8px; width: 200px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            z-index: 1000; opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.2s;
        }
        .export-menu.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .export-item { 
            padding: 12px 16px; font-size: 13px; color: var(--text); cursor: pointer; 
            display: flex; align-items: center; gap: 8px; transition: background 0.2s;
        }
        .export-item:hover { background: var(--surface2); color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            ETF Pro Terminal
        </div>
        <div class="nav-actions">
            <a href="/screening-demo" class="btn btn-ghost">筛选演示</a>
            <a href="/" class="btn btn-ghost">返回列表</a>
            <div class="export-dropdown">
                <button class="btn btn-primary" onclick="toggleExportMenu()">导出分析 ▾</button>
                <div class="export-menu" id="exportMenu">
                    <div class="export-item" onclick="exportScreenshot()">📸 网页截图 (高保真)</div>
                    <div class="export-item" onclick="window.open('/compare/v3/print?codes='+currentCodes, '_blank')">🖨️ 打印版本 (白底)</div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="etf-banner">
            <div class="etf-tags" id="etfTags"></div>
            <div class="summary-stats" id="summaryStats"></div>
        </div>

        <div class="section-title">🏆 指标冠军榜</div>
        <div class="leaderboard-grid" id="leaderboard"></div>

        <div class="section-title">📊 风险收益深度对比</div>
        <div class="filter-panel" id="filterPanel"></div>
        
        <div class="chart-row" id="chartsContainer">
            <div class="chart-box" id="box_year_1_return">
                <div class="chart-header">
                    <span class="chart-title">1年收益率</span>
                    <span class="chart-unit">%</span>
                </div>
                <div class="chart-container"><canvas id="chartReturn"></canvas></div>
            </div>
            <div class="chart-box" id="box_annual_vol">
                <div class="chart-header">
                    <span class="chart-title">年化波动率</span>
                    <span class="chart-unit">%</span>
                </div>
                <div class="chart-container"><canvas id="chartVol"></canvas></div>
            </div>
            <div class="chart-box" id="box_max_drawdown">
                <div class="chart-header">
                    <span class="chart-title">最大回撤</span>
                    <span class="chart-unit">%</span>
                </div>
                <div class="chart-container"><canvas id="chartDD"></canvas></div>
            </div>
            <div class="chart-box" id="box_sharpe_ratio">
                <div class="chart-header">
                    <span class="chart-title">夏普比率</span>
                    <span class="chart-unit">Ratio</span>
                </div>
                <div class="chart-container"><canvas id="chartSharpe"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // --- Global State ---
        const etfs = {{ etfs | tojson }};
        let currentCodes = etfs.map(e => e.code).join(',');
        let activeMetrics = ['year_1_return', 'annual_vol', 'max_drawdown', 'sharpe_ratio'];
        const chartInstances = {};

        const metricMap = {
            'year_1_return': { label: '1年收益率', id: 'chartReturn', unit: '%' },
            'annual_vol': { label: '年化波动率', id: 'chartVol', unit: '%' },
            'max_drawdown': { label: '最大回撤', id: 'chartDD', unit: '%' },
            'sharpe_ratio': { label: '夏普比率', id: 'chartSharpe', unit: 'Ratio' }
        };

        const colors = ['#00d4ff', '#7c3aed', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6'];

        // --- Utils ---
        const fmt = (val, dec = 2, unit = '') => {
            if (val === null || val === undefined) return 'N/A';
            return parseFloat(val).toFixed(dec) + unit;
        };

        // --- UI Modules ---
        function renderHeader() {
            const tagsContainer = document.getElementById('etfTags');
            const statsContainer = document.getElementById('summaryStats');
            if (!tagsContainer || !statsContainer) return;

            tagsContainer.innerHTML = etfs.map((e, i) => `
                <div class="etf-tag">
                    <span class="etf-tag-dot" style="background:${colors[i % colors.length]}"></span>
                    ${e.code} ${e.name}
                </div>
            `).join('');

            const totalScale = etfs.reduce((sum, e) => sum + (parseFloat(e.scale) || 0), 0);
            const avgReturn = etfs.reduce((sum, e) => sum + (parseFloat(e.year_1_return) || 0), 0) / etfs.length;

            statsContainer.innerHTML = `
                <div class="stat-item">
                    <span class="stat-label">对比 ETF</span>
                    <span class="stat-value">${etfs.length}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">合计规模</span>
                    <span class="stat-value">${fmt(totalScale / 100, 2, '亿')}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">平均收益率</span>
                    <span class="stat-value accent">${fmt(avgReturn, 2, '%')}</span>
                </div>
            `;
        }

        function renderLeaderboard() {
            const lb = document.getElementById('leaderboard');
            if (!lb) return;

            const metrics = [
                { key: 'year_1_return', label: '最高收益(1Y)', icon: '🚀', sort: 'desc', color: 'val-up' },
                { key: 'max_drawdown', label: '最低回撤', icon: '🛡️', sort: 'asc', color: 'val-up' },
                { key: 'sharpe_ratio', label: '最佳夏普', icon: '⭐', sort: 'desc', color: 'val-up' },
                { key: 'scale', label: '最大规模', icon: '🏛️', sort: 'desc', color: 'val-up' },
                { key: 'volume', label: '最高流动性', icon: '🌊', sort: 'desc', color: 'val-up' },
                { key: 'annual_vol', label: '最低波动率', icon: '📉', sort: 'asc', color: 'val-up' }
            ];

            lb.innerHTML = metrics.map(m => {
                const sorted = [...etfs].sort((a, b) => {
                    const valA = parseFloat(a[m.key]) || 0;
                    const valB = parseFloat(b[m.key]) || 0;
                    return m.sort === 'desc' ? valB - valA : valA - valB;
                });

                return `
                    <div class="leader-card">
                        <div class="leader-header">
                            <span class="leader-label">${m.icon} ${m.label}</span>
                        </div>
                        <div class="leader-list">
                            ${sorted.slice(0, 3).map(e => `
                                <div class="leader-item">
                                    <span class="leader-name">${e.name}</span>
                                    <span class="leader-val ${m.color}">${fmt(e[m.key], 2, m.key === 'scale' ? '亿' : (m.key === 'volume' ? '亿' : '%'))}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderFilters() {
            const panel = document.getElementById('filterPanel');
            if (!panel) return;
            panel.innerHTML = Object.entries(metricMap).map(([key, m]) => `
                <div class="filter-chip ${activeMetrics.includes(key) ? 'active' : ''}" 
                     onclick="toggleMetric('${key}')">${m.label}</div>
            `).join('');
        }

        function toggleMetric(key) {
            if (activeMetrics.includes(key)) {
                activeMetrics = activeMetrics.filter(m => m !== key);
            } else {
                activeMetrics.push(key);
            }
            renderFilters();
            updateChartVisibility();
        }

        function updateChartVisibility() {
            Object.entries(metricMap).forEach(([key, m]) => {
                const box = document.getElementById('box_' + key);
                if (box) box.style.display = activeMetrics.includes(key) ? 'block' : 'none';
            });
        }

        // --- Chart Module ---
        function initCharts() {
            Chart.register(ChartDataLabels);

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        anchor: 'end', align: 'top', color: '#fff',
                        font: { weight: 'bold', size: 11 },
                        formatter: (val) => val === 0 ? '' : fmt(val, 2),
                        offset: 4
                    }
                },
                scales: {
                    x: { ticks: { color: '#6b7d99', font: { size: 11 } }, grid: { display: false } },
                    y: { 
                        ticks: { color: '#6b7d99', font: { size: 10 } }, 
                        grid: { color: 'rgba(30,45,69,0.4)' },
                        grace: '15%' 
                    }
                }
            };

            Object.entries(metricMap).forEach(([key, m]) => {
                const ctx = document.getElementById(m.id);
                if (!ctx) return;

                const data = etfs.map(e => parseFloat(e[key]) || 0);
                const labels = etfs.map(e => e.code);

                chartInstances[m.id] = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: colors.map((c, i) => colors[i % colors.length]),
                            borderRadius: 6,
                            barThickness: 40
                        }]
                    },
                    options: { ...commonOptions }
                });
            });
        }

        // --- Export Module ---
        function toggleExportMenu() {
            const menu = document.getElementById('exportMenu');
            if (!menu) return;
            menu.classList.toggle('show');
        }

        async function exportScreenshot() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ preferCurrentTab: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                const imgData = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `ETF-Comparison-${new Date().toISOString().slice(0,10)}.png`;
                link.href = imgData;
                link.click();

                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                alert('截图失败: ' + err.message);
            }
        }

        // --- Core Init ---
        window.onload = () => {
            try {
                renderHeader();
                renderLeaderboard();
                renderFilters();
                initCharts();
                updateChartVisibility();
            } catch (e) {
                console.error('Initialization Error:', e);
            }
        };
    </script>
</body>
</html>

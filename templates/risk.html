<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风险指标 - {{ code }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0a0e27; color: #e2e8f0; }
        .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
        .back-link { color: #60a5fa; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        h1 { font-size: 20px; font-weight: 600; margin: 12px 0 4px; }
        .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }

        .yingmi-banner { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .yingmi-banner p { color: #fbbf24; font-size: 13px; flex: 1; }
        .btn-fetch { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #fbbf24; color: #1a1a0a; transition: background 0.2s; }
        .btn-fetch:hover { background: #f59e0b; }
        .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; }

        .period-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .period-tab { padding: 8px 18px; border-radius: 6px; background: #1e293b; color: #94a3b8; border: none; cursor: pointer; font-size: 13px; }
        .period-tab.active { background: #3b82f6; color: #fff; }
        .period-tab:hover { background: #334155; }

        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .metric-card { background: #1e293b; border-radius: 10px; padding: 16px; cursor: pointer; transition: background 0.2s, transform 0.15s; }
        .metric-card:hover { background: #263548; transform: translateY(-2px); }
        .metric-card.fetching { opacity: 0.6; pointer-events: none; }
        .metric-label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .metric-label .badge { font-size: 10px; background: rgba(251,191,36,0.15); color: #fbbf24; padding: 1px 6px; border-radius: 4px; }
        .metric-value { font-size: 22px; font-weight: 600; }
        .metric-value.positive { color: #22c55e; }
        .metric-value.negative { color: #ef4444; }
        .metric-value.neutral { color: #60a5fa; }
        .metric-value.empty { color: #4b5563; font-size: 14px; }

        .chart-wrapper { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
        .chart-wrapper h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #e2e8f0; }
        .chart-box { position: relative; width: 100%; height: 280px; }

        .footer-info { margin-top: 40px; padding-top: 16px; border-top: 1px solid #1e293b; color: #6b7280; font-size: 11px; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回列表</a>
        <h1 id="title">{{ code }}</h1>
        <div class="subtitle" id="subtitle">加载ETF信息...</div>

        <!-- 盈米数据获取入口 -->
        <div class="yingmi-banner" id="yingmi-banner">
            <p>📊 风险指标（夏普、卡玛、波动率、回撤）来自盈米，点击下方指标卡片可实时获取。</p>
            <button class="btn-fetch" id="btn-fetch-all" onclick="fetchYingmiAll()">一键获取盈米数据</button>
        </div>

        <div class="period-tabs" id="period-tabs">
            <button class="period-tab active" onclick="switchPeriod('oneYear')">近1年</button>
            <button class="period-tab" onclick="switchPeriod('twoYear')">近2年</button>
            <button class="period-tab" onclick="switchPeriod('threeYear')">近3年</button>
            <button class="period-tab" onclick="switchPeriod('fiveYear')">近5年</button>
        </div>

        <div class="metric-grid" id="metric-grid">
            <div class="metric-card" id="card-return" onclick="fetchMetric('return')">
                <div class="metric-label">累计收益 <span class="badge">点击获取</span></div>
                <div class="metric-value empty" id="m-return">--</div>
            </div>
            <div class="metric-card" id="card-volatility" onclick="fetchMetric('volatility')">
                <div class="metric-label">年化波动率 <span class="badge">点击获取</span></div>
                <div class="metric-value empty" id="m-volatility">--</div>
            </div>
            <div class="metric-card" id="card-drawdown" onclick="fetchMetric('drawdown')">
                <div class="metric-label">最大回撤 <span class="badge">点击获取</span></div>
                <div class="metric-value empty" id="m-drawdown">--</div>
            </div>
            <div class="metric-card" id="card-sharpe" onclick="fetchMetric('sharpe')">
                <div class="metric-label">夏普比率 <span class="badge">点击获取</span></div>
                <div class="metric-value empty" id="m-sharpe">--</div>
            </div>
            <div class="metric-card" id="card-calmar" onclick="fetchMetric('calmar')">
                <div class="metric-label">卡玛值 <span class="badge">点击获取</span></div>
                <div class="metric-value empty" id="m-calmar">--</div>
            </div>
        </div>

        <div class="chart-wrapper" id="chart-wrapper">
            <h3>多周期指标对比（获取盈米数据后展示）</h3>
            <div class="chart-box">
                <canvas id="multiChart" role="img" aria-label="多周期风险指标对比图">浏览器不支持Canvas</canvas>
            </div>
        </div>

        <div class="footer-info">
            风险数据来源：盈米/且慢（点击获取）<br>
            行情数据来源：非凸科技<br>
            数据仅供参考，不构成投资建议。
        </div>
    </div>

    <script>
        const code = '{{ code }}';
        let allData = {};
        let currentPeriod = 'oneYear';
        let multiChart = null;
        let yingmiLoaded = false;

        // Load ETF detail
        fetch('/api/etf/' + code)
            .then(r => r.json())
            .then(etf => {
                document.getElementById('title').innerHTML = code + ' - ' + (etf.name || '') + (etf.issuer_short ? ' - ' + etf.issuer_short : '');
                document.getElementById('subtitle').innerHTML = '规模：' + (etf.scale || 0).toFixed(2) + '亿 ｜ 份额：' + (etf.shares || 0).toFixed(2) + '亿份 ｜ 最新价：' + (etf.close || 0).toFixed(3);
            });

        // Fetch all Yingmi data
        function fetchYingmiAll() {
            const btn = document.getElementById('btn-fetch-all');
            btn.disabled = true;
            btn.textContent = '获取中...';
            document.getElementById('yingmi-banner').querySelector('p').textContent = '⏳ 正在从盈米获取数据，请稍候...';

            fetch('/api/risk/' + code)
                .then(r => r.json())
                .then(data => {
                    yingmiLoaded = true;
                    allData = data;
                    updateDisplay();
                    renderMultiChart();
                    document.getElementById('yingmi-banner').querySelector('p').textContent = '✅ 盈米数据已加载，以下指标均为盈米数据。';
                    btn.textContent = '已获取';
                    // Remove clickable badges
                    document.querySelectorAll('.badge').forEach(b => b.remove());
                    document.querySelectorAll('.metric-card').forEach(c => c.onclick = null);
                })
                .catch(() => {
                    document.getElementById('yingmi-banner').querySelector('p').textContent = '⚠️ 盈米数据获取失败，请稍后重试。';
                    btn.disabled = false;
                    btn.textContent = '重试获取';
                });
        }

        // Fetch single metric (not used currently, kept for future)
        function fetchMetric(metric) {
            if (yingmiLoaded) return;
            fetchYingmiAll();
        }

        function switchPeriod(p) {
            currentPeriod = p;
            document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[onclick="switchPeriod('${p}')"]`).classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            const d = allData[currentPeriod] || {};
            const ret = d['收益能力'] || 0;
            const vol = d['抗波动能力'] || 0;
            const dd = d['抗回撤能力'] || 0;
            const sharpe = d['投资性价比'] || 0;
            const calmar = d['卡玛值'] || 0;

            setVal('m-return', ret ? ((ret >= 0 ? '+' : '') + ret.toFixed(2) + '%') : '暂无', ret >= 0);
            setVal('m-volatility', vol ? vol.toFixed(2) + '%' : '暂无', null);
            setVal('m-drawdown', dd ? dd.toFixed(2) + '%' : '暂无', !dd || dd >= 0);
            setVal('m-sharpe', sharpe ? sharpe.toFixed(2) : '暂无', sharpe >= 1);
            setVal('m-calmar', calmar ? calmar.toFixed(2) : '暂无', calmar >= 1);
        }

        function setVal(id, text, isPositive) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'metric-value';
            if (isPositive === true) el.classList.add('positive');
            else if (isPositive === false) el.classList.add('negative');
            else if (text === '暂无') el.classList.add('empty');
            else el.classList.add('neutral');
        }

        function renderMultiChart() {
            const periods = ['oneYear', 'twoYear', 'threeYear', 'fiveYear'];
            const labels = ['近1年', '近2年', '近3年', '近5年'];
            const rets = periods.map(p => allData[p] ? (allData[p]['收益能力'] || 0) : 0);
            const vols = periods.map(p => allData[p] ? (allData[p]['抗波动能力'] || 0) : 0);
            const dds = periods.map(p => allData[p] ? (allData[p]['抗回撤能力'] || 0) : 0);

            if (multiChart) multiChart.destroy();

            const ctx = document.getElementById('multiChart').getContext('2d');
            multiChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '累计收益(%)', data: rets, backgroundColor: 'rgba(34,197,94,0.6)', borderColor: '#22c55e', borderWidth: 1 },
                        { label: '年化波动率(%)', data: vols, backgroundColor: 'rgba(96,165,250,0.6)', borderColor: '#60a5fa', borderWidth: 1 },
                        { label: '最大回撤(%)', data: dds, backgroundColor: 'rgba(239,68,68,0.6)', borderColor: '#ef4444', borderWidth: 1 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
                    scales: {
                        x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(148,163,184,0.1)' } },
                        y: { ticks: { color: '#94a3b8', callback: v => v + '%' }, grid: { color: 'rgba(148,163,184,0.1)' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
